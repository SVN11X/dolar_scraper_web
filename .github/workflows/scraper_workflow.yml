name: Actualizar Datos Dolar

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora
  workflow_dispatch:      # Permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write         # Permiso crucial para que la Action haga push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v5

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Scraper
      run: python src/scraper.py

    - name: Commit y Push de los cambios
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/precios.json
        git commit -m "Auto-update: Datos del dólar $(date +'%Y-%m-%d')" || echo "No hay cambios para subir"
        git push